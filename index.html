<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Chat</title>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: #13132a;
            --primary: #1c1c3a;
            --accent: #ff4d6a;
            --text: #e9e9f0;
            --text2: #9d9db5;
            --border: #2a2a45;
            --input-bg: #1c1c38;
            --bubble-user: #ff4d6a;
            --bubble-ai: #1c1c3a;
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 750px;
            height: 100dvh;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
        }
        /* Tabs */
        .tabs {
            display: flex;
            background: var(--primary);
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-weight: 600;
            color: var(--text2);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            background: none;
            border: none;
            outline: none;
        }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .panel {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .panel.active { display: flex; }

        /* Chat */
        .chat-header {
            padding: 10px 14px;
            background: var(--primary);
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .chat-header select {
            flex: 1;
            padding: 9px 14px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            font-size: 0.85rem;
        }
        .btn-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-icon:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-sm {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-sm:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: var(--radius);
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 0.92rem;
            animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-msg { align-self: flex-end; background: var(--bubble-user); border-bottom-right-radius: var(--radius-sm); color: #fff; }
        .ai-msg { align-self: flex-start; background: var(--bubble-ai); border-bottom-left-radius: var(--radius-sm); border: 1px solid var(--border); }
        .msg-meta { font-size: 0.65rem; color: var(--text2); margin-top: 4px; display: flex; justify-content: space-between; }

        .chat-input {
            padding: 12px 14px;
            background: var(--primary);
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border);
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            font-size: 0.92rem;
        }
        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* TTS */
        .tts-container {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            overflow-y: auto;
        }
        .tts-container h2 { font-size: 1.3rem; }
        .tts-container select, .tts-container textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            resize: vertical;
        }
        .tts-container textarea { min-height: 120px; }
        .tts-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }
        .tts-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .audio-box { width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .audio-box audio { width: 100%; }
        .download-link { color: var(--accent); text-decoration: none; font-size: 0.9rem; }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal-content input {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
        }
        .modal-content button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="tabs">
        <button class="tab active" data-tab="chat">💬 Chat</button>
        <button class="tab" data-tab="tts">🔊 TTS</button>
    </div>

    <!-- Chat Panel -->
    <div class="panel active" id="panel-chat">
        <div class="chat-header">
            <select id="modelSelect"></select>
            <button class="btn-icon" id="clearBtn" title="Xóa">🗑️</button>
            <button class="btn-sm" id="settingsBtn">⚙️ API</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div style="text-align:center;color:var(--text2);margin-top:40px;">🤖 Chọn model và bắt đầu trò chuyện</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autofocus>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <!-- TTS Panel -->
    <div class="panel" id="panel-tts">
        <div class="tts-container">
            <h2>🔊 Chuyển văn bản thành giọng nói</h2>
            <select id="ttsModelSelect"></select>
            <textarea id="ttsText" placeholder="Nhập văn bản..."></textarea>
            <button class="tts-btn" id="ttsGenerateBtn">🎤 Tạo giọng nói</button>
            <div class="audio-box" id="ttsAudioContainer" style="display:none;">
                <audio controls id="ttsAudio"></audio>
                <a class="download-link" id="ttsDownload" href="#" download="speech.mp3">📥 Tải file MP3</a>
            </div>
        </div>
    </div>
</div>

<!-- Modal API Key -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3 style="color:var(--text);">Cài đặt API Key</h3>
        <input type="text" id="apiKeyInput" placeholder="API Key (để trống dùng mặc định)">
        <button id="saveApiKeyBtn">Lưu</button>
    </div>
</div>

<script>
// ==================== GLOBAL ====================
let isStreaming = false;
let currentStreamAbort = null;
let apiKey = localStorage.getItem('apiKey') || '';

// Tabs
document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('panel-'+t.dataset.tab).classList.add('active');
    });
});

// Settings modal
const modal = document.getElementById('settingsModal');
document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('apiKeyInput').value = apiKey;
    modal.classList.add('show');
});
document.getElementById('saveApiKeyBtn').addEventListener('click', () => {
    apiKey = document.getElementById('apiKeyInput').value.trim();
    localStorage.setItem('apiKey', apiKey);
    modal.classList.remove('show');
});
modal.addEventListener('click', e => { if(e.target===modal) modal.classList.remove('show'); });

// Load models
async function loadModels() {
    try {
        const res = await fetch('/api/models');
        const models = await res.json();
        const chatSel = document.getElementById('modelSelect');
        const ttsSel = document.getElementById('ttsModelSelect');
        const textModels = models.filter(m => m.type==='text');
        const free = textModels.filter(m => m.tier==='FREE');
        const paid = textModels.filter(m => m.tier==='PAID');
        function addGroup(sel, label, arr) {
            const g = document.createElement('optgroup');
            g.label = label;
            arr.forEach(m => {
                const o = document.createElement('option');
                o.value = m.name;
                o.textContent = `${m.tier==='FREE'?'🆓':'💰'} ${m.name} - ${m.desc}`;
                g.appendChild(o);
            });
            sel.appendChild(g);
        }
        addGroup(chatSel, 'Miễn phí', free);
        addGroup(chatSel, 'Trả phí', paid);
        const savedChat = localStorage.getItem('chatModel');
        if(savedChat) chatSel.value = savedChat;
        chatSel.addEventListener('change', () => localStorage.setItem('chatModel', chatSel.value));

        models.filter(m => m.type==='tts').forEach(m => {
            const o = document.createElement('option');
            o.value = m.name;
            o.textContent = m.desc;
            ttsSel.appendChild(o);
        });
        const savedTTS = localStorage.getItem('ttsModel');
        if(savedTTS) ttsSel.value = savedTTS;
        ttsSel.addEventListener('change', () => localStorage.setItem('ttsModel', ttsSel.value));
    } catch(e) { console.error(e); }
}

// ==================== CHAT (streaming) ====================
const chatBox = document.getElementById('chatMessages');
function addMessage(role, content, usage) {
    if(!chatBox.querySelector('.msg-placeholder') && chatBox.children.length===0) chatBox.innerHTML='';
    const div = document.createElement('div');
    div.className = `message ${role==='user'?'user-msg':'ai-msg'}`;
    let html = escapeHtml(content);
    html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre style="background:rgba(0,0,0,0.3);padding:8px;border-radius:8px;overflow-x:auto;"><code>$2</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;">$1</code>');
    div.innerHTML = html;
    if(usage) {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.innerHTML = `<span>🤖 AI</span><span>📊 ${usage.total_tokens||0} tokens</span>`;
        div.appendChild(meta);
    } else if(role==='user') {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.innerHTML = '<span>👤 Bạn</span>';
        div.appendChild(meta);
    }
    chatBox.appendChild(div);
    requestAnimationFrame(() => chatBox.scrollTop = chatBox.scrollHeight);
    // Giới hạn 200 tin nhắn
    while(chatBox.children.length > 200) chatBox.removeChild(chatBox.firstChild);
}

function escapeHtml(text) {
    const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
    return text.replace(/[&<>"']/g, m => map[m]);
}

async function sendMessage() {
    if(isStreaming) return;
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if(!message) return;
    const model = document.getElementById('modelSelect').value;
    if(!model) { alert('Chọn model!'); return; }
    input.value = '';
    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', message);

    // Tạo phần tử AI trống để điền dần
    const aiDiv = document.createElement('div');
    aiDiv.className = 'message ai-msg';
    aiDiv.id = 'streamingMsg';
    chatBox.appendChild(aiDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const controller = new AbortController();
        currentStreamAbort = controller;
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ model, message, api_key: apiKey||undefined, stream: true }),
            signal: controller.signal
        });
        if(!resp.ok) {
            const err = await resp.json().catch(() => ({error: 'Lỗi không xác định'}));
            aiDiv.innerHTML = '❌ ' + (err.error || resp.status);
            return;
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';
        while(true) {
            const {done, value} = await reader.read();
            if(done) break;
            const text = decoder.decode(value);
            const lines = text.split('\n');
            for(const line of lines) {
                if(line.startsWith('data: ')) {
                    const data = line.slice(6);
                    if(data === '[DONE]') continue;
                    try {
                        const json = JSON.parse(data);
                        if(json.error) {
                            aiDiv.innerHTML = '❌ ' + json.error;
                            return;
                        }
                        if(json.token) {
                            fullContent += json.token;
                            aiDiv.innerHTML = escapeHtml(fullContent)
                                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre style="background:rgba(0,0,0,0.3);padding:8px;border-radius:8px;overflow-x:auto;"><code>$2</code></pre>')
                                .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;">$1</code>');
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                        if(json.usage) {
                            const meta = document.createElement('div');
                            meta.className = 'msg-meta';
                            meta.innerHTML = `<span>🤖 AI</span><span>📊 ${json.usage.total_tokens||0} tokens</span>`;
                            aiDiv.appendChild(meta);
                        }
                    } catch(e) {}
                }
            }
        }
        aiDiv.removeAttribute('id');
    } catch(e) {
        if(e.name !== 'AbortError') {
            document.getElementById('streamingMsg')?.remove();
            addMessage('ai', '❌ Lỗi kết nối: ' + e.message);
        }
    } finally {
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
        currentStreamAbort = null;
    }
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('userInput').addEventListener('keydown', e => {
    if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('clearBtn').addEventListener('click', () => {
    if(confirm('Xóa lịch sử?')) {
        chatBox.innerHTML = '<div style="text-align:center;color:var(--text2);margin-top:40px;">🤖 Chọn model và bắt đầu trò chuyện</div>';
    }
});

// ==================== TTS ====================
let ttsLoading = false;
document.getElementById('ttsGenerateBtn').addEventListener('click', async () => {
    if(ttsLoading) return;
    const text = document.getElementById('ttsText').value.trim();
    if(!text) { alert('Nhập văn bản!'); return; }
    const model = document.getElementById('ttsModelSelect').value;
    if(!model) { alert('Chọn model TTS!'); return; }
    ttsLoading = true;
    const btn = document.getElementById('ttsGenerateBtn');
    btn.textContent = '⏳ Đang tạo...';
    btn.disabled = true;
    try {
        const resp = await fetch('/api/tts', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ model, text, api_key: apiKey||undefined })
        });
        if(!resp.ok) {
            const err = await resp.json().catch(() => ({error: 'Lỗi không xác định'}));
            alert('Lỗi: ' + (err.error || resp.status));
            return;
        }
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        document.getElementById('ttsAudio').src = url;
        document.getElementById('ttsAudioContainer').style.display = 'flex';
        document.getElementById('ttsDownload').href = url;
    } catch(e) {
        alert('Lỗi: ' + e.message);
    } finally {
        ttsLoading = false;
        btn.textContent = '🎤 Tạo giọng nói';
        btn.disabled = false;
    }
});

loadModels();
</script>
</body>
</html>
