<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultimate AI Chat</title>
    <style>
        :root {
            --bg: #0a0a14; --surface: #13132a; --primary: #1c1c3a; --accent: #ff4d6a;
            --text: #e9e9f0; --text2: #9d9db5; --border: #2a2a45; --input-bg: #1c1c38;
            --bubble-user: #ff4d6a; --bubble-ai: #1c1c3a; --thinking-text: #ffb300;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; justify-content: center; align-items: center; }
        .app { width: 100%; max-width: 750px; height: 100dvh; background: var(--surface); display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(0,0,0,.6); }
        .tabs { display: flex; background: var(--primary); border-bottom: 1px solid var(--border); }
        .tab { flex:1; padding:14px; text-align:center; font-weight:600; color:var(--text2); cursor:pointer; border-bottom:3px solid transparent; background:none; border:none; }
        .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
        .panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
        .panel.active { display:flex; }
        .chat-header { padding:8px 12px; background:var(--primary); display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); }
        .chat-header select { flex:1; padding:8px 12px; border-radius:20px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:.85rem; outline:none; }
        .btn-icon { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:var(--input-bg); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .btn-icon:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
        .btn-sm { padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-weight:600; font-size:.8rem; cursor:pointer; }
        .btn-sm:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
        .chat-messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; scroll-behavior:smooth; contain:content; }
        .chat-messages::-webkit-scrollbar { width:5px; }
        .chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
        .msg { max-width:85%; padding:10px 14px; border-radius:16px; line-height:1.5; word-wrap:break-word; white-space:pre-wrap; font-size:.92rem; animation:fadeUp .3s; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .msg.user { align-self:flex-end; background:var(--bubble-user); color:#fff; border-bottom-right-radius:6px; }
        .msg.ai { align-self:flex-start; background:var(--bubble-ai); border:1px solid var(--border); border-bottom-left-radius:6px; }
        .msg .meta { font-size:.7rem; color:var(--text2); margin-top:4px; display:flex; justify-content:space-between; }
        .thinking-container { margin-bottom:12px; border-left:3px solid var(--thinking-text); background:rgba(255,179,0,.06); border-radius:0 12px 12px 0; overflow:hidden; }
        .thinking-header { padding:8px 12px; font-size:.8rem; font-weight:700; color:var(--thinking-text); cursor:pointer; user-select:none; background:rgba(255,179,0,.04); }
        .thinking-content { padding:10px 12px; font-size:.85rem; color:#d1b170; font-style:italic; white-space:pre-wrap; display:none; }
        .thinking-container.open .thinking-content { display:block; }
        pre { background:#090915; padding:14px; border-radius:12px; overflow-x:auto; margin:10px 0; border:1px solid rgba(255,255,255,.08); }
        code { font-family: Consolas, monospace; font-size:.85rem; }
        p code { background:rgba(255,255,255,.08); padding:2px 6px; border-radius:6px; color:var(--accent); }
        .chat-input { padding:10px 12px; background:var(--primary); display:flex; gap:8px; border-top:1px solid var(--border); }
        .chat-input input { flex:1; padding:12px 16px; border-radius:24px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); outline:none; font-size:.92rem; }
        .chat-input input:focus { border-color:var(--accent); }
        .send-btn { width:44px; height:44px; border-radius:50%; border:none; background:var(--accent); color:#fff; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; }
        .send-btn:disabled { opacity:.5; cursor:default; }
        /* TTS Panel */
        .tts-container { padding:20px; display:flex; flex-direction:column; gap:14px; align-items:center; overflow-y:auto; }
        .tts-container select,.tts-container textarea { width:100%; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); outline:none; }
        .tts-container textarea { min-height:100px; resize:vertical; }
        .tts-btn { background:var(--accent); color:#fff; border:none; padding:12px 24px; border-radius:24px; font-weight:600; cursor:pointer; }
        .tts-btn:disabled { opacity:.5; }
        .audio-box { width:100%; display:flex; flex-direction:column; gap:8px; align-items:center; }
        .audio-box audio { width:100%; }
        .download-link { color:var(--accent); text-decoration:none; font-size:.9rem; }
        /* Modal */
        .modal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; justify-content:center; align-items:center; z-index:100; }
        .modal.show { display:flex; }
        .modal-content { background:var(--surface); padding:20px; border-radius:16px; width:90%; max-width:400px; display:flex; flex-direction:column; gap:12px; }
        .modal-content input { padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); }
        .modal-content button { padding:10px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; }
    </style>
</head>
<body>
<div class="app">
    <div class="tabs">
        <button class="tab active" data-tab="chat">💬 Chat</button>
        <button class="tab" data-tab="tts">🔊 TTS</button>
    </div>
    <div class="panel active" id="panel-chat">
        <div class="chat-header">
            <select id="modelSelect"></select>
            <button class="btn-icon" id="clearBtn">🗑️</button>
            <button class="btn-sm" id="settingsBtn">⚙️ API</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autofocus>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
    <div class="panel" id="panel-tts">
        <div class="tts-container">
            <h2>🔊 Chuyển văn bản thành giọng nói</h2>
            <select id="ttsModelSelect"></select>
            <textarea id="ttsText" placeholder="Nhập văn bản..."></textarea>
            <button class="tts-btn" id="ttsGenerateBtn">🎤 Tạo giọng nói</button>
            <div class="audio-box" id="ttsAudioContainer" style="display:none;">
                <audio controls id="ttsAudio"></audio>
                <a class="download-link" id="ttsDownload" href="#" download="speech.mp3">📥 Tải MP3</a>
            </div>
        </div>
    </div>
</div>
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>API Key</h3>
        <input type="text" id="apiKeyInput" placeholder="Nhập API Key (tuỳ chọn)">
        <button id="saveApiKeyBtn">Lưu</button>
    </div>
</div>

<script>
// ─────────────── GLOBALS ───────────────
let isStreaming = false, streamAbort = null, apiKey = localStorage.getItem('apiKey')||'';
const chatBox = document.getElementById('chatMessages'), userInput = document.getElementById('userInput');
let chatHistory = []; // Multi‑turn memory

// ─────────────── TABS & MODAL ───────────────
document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
        document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('panel-'+t.dataset.tab).classList.add('active');
    });
});
const modal=document.getElementById('settingsModal');
document.getElementById('settingsBtn').addEventListener('click',()=>{
    document.getElementById('apiKeyInput').value=apiKey; modal.classList.add('show');
});
document.getElementById('saveApiKeyBtn').addEventListener('click',()=>{
    apiKey=document.getElementById('apiKeyInput').value.trim();
    localStorage.setItem('apiKey',apiKey); modal.classList.remove('show');
});
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('show');});

// ─────────────── LOAD MODELS ───────────────
async function loadModels(){
    try{
        const res=await fetch('/api/models');
        const models=await res.json();
        const chatSel=document.getElementById('modelSelect');
        const ttsSel=document.getElementById('ttsModelSelect');
        const text=models.filter(m=>m.type==='text');
        const free=text.filter(m=>m.tier==='FREE'), paid=text.filter(m=>m.tier==='PAID');
        function addGroup(sel,label,arr){
            const g=document.createElement('optgroup'); g.label=label;
            arr.forEach(m=>{const o=document.createElement('option'); o.value=m.name; o.textContent=`${m.tier==='FREE'?'🆓':'💰'} ${m.desc}`; g.appendChild(o);});
            sel.appendChild(g);
        }
        addGroup(chatSel,'Miễn phí',free); addGroup(chatSel,'Trả phí',paid);
        const savedChat=localStorage.getItem('chatModel'); if(savedChat)chatSel.value=savedChat;
        chatSel.addEventListener('change',()=>localStorage.setItem('chatModel',chatSel.value));
        models.filter(m=>m.type==='tts').forEach(m=>{
            const o=document.createElement('option'); o.value=m.name; o.textContent=m.desc; ttsSel.appendChild(o);
        });
        const savedTTS=localStorage.getItem('ttsModel'); if(savedTTS)ttsSel.value=savedTTS;
        ttsSel.addEventListener('change',()=>localStorage.setItem('ttsModel',ttsSel.value));
    }catch(e){console.error(e);}
}

// ─────────────── HELPER ───────────────
function escapeHtml(t){const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};return t.replace(/[&<>"']/g,c=>m[c]);}
function parseMarkdown(t){
    let html = escapeHtml(t);
    html = html.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
    html = html.replace(/`([^`\n]+)`/g,'<code>$1</code>');
    return html;
}

// ─────────────── TTS BUTTON ON MESSAGES ───────────────
async function speakText(text, btn){
    btn.textContent='⏳...'; btn.disabled=true;
    const ttsModel = document.getElementById('ttsModelSelect').value || 'vi-VN-NamMinhNeural';
    try{
        const resp = await fetch('/api/tts',{
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({model:ttsModel, text, api_key:apiKey||undefined})
        });
        if(!resp.ok) throw new Error('TTS failed');
        const blob = await resp.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.play();
        btn.textContent='🔊'; btn.disabled=false;
    }catch(e){
        btn.textContent='❌'; setTimeout(()=>{btn.textContent='🔊';btn.disabled=false;},1500);
    }
}

// ─────────────── STREAMING CHAT ───────────────
function addMessage(role, text, usage=null, thinking=''){
    const div=document.createElement('div');
    div.className='msg '+(role==='user'?'user':'ai');
    if(thinking){
        const tc=document.createElement('div');
        tc.className='thinking-container open';
        tc.innerHTML=`<div class="thinking-header" onclick="this.parentElement.classList.toggle('open')">🤔 Suy nghĩ</div><div class="thinking-content">${escapeHtml(thinking)}</div>`;
        div.appendChild(tc);
    }
    const content=document.createElement('div');
    content.innerHTML=parseMarkdown(text);
    div.appendChild(content);
    const meta=document.createElement('div');
    meta.className='meta';
    if(role==='user'){
        meta.innerHTML='<span>👤 Bạn</span>';
    }else{
        meta.innerHTML=`<span>🤖 AI</span><span>${usage?`📊 ${usage.total_tokens||0} tokens`:''}</span>`;
        const ttsBtn=document.createElement('button');
        ttsBtn.className='btn-sm'; ttsBtn.style='margin-left:8px;'; ttsBtn.textContent='🔊';
        ttsBtn.addEventListener('click',()=>speakText(text, ttsBtn));
        meta.appendChild(ttsBtn);
    }
    div.appendChild(meta);
    chatBox.appendChild(div);
    chatBox.scrollTop=chatBox.scrollHeight;
    while(chatBox.children.length>200) chatBox.removeChild(chatBox.firstChild);
}

async function sendMessage(){
    if(isStreaming) return;
    const msg=userInput.value.trim(); if(!msg) return;
    const model=document.getElementById('modelSelect').value; if(!model){alert('Chọn model!'); return;}
    userInput.value=''; isStreaming=true; document.getElementById('sendBtn').disabled=true;
    addMessage('user', msg);
    chatHistory.push({role:'user', content:msg});

    const aiDiv=document.createElement('div'); aiDiv.className='msg ai'; aiDiv.id='streamingMsg';
    const thinkingDiv=document.createElement('div'); thinkingDiv.className='thinking-container'; thinkingDiv.style.display='none';
    thinkingDiv.innerHTML=`<div class="thinking-header" onclick="this.parentElement.classList.toggle('open')">🤔 Suy nghĩ</div><div class="thinking-content" id="liveThinking"></div>`;
    aiDiv.appendChild(thinkingDiv);
    const contentSpan=document.createElement('span'); aiDiv.appendChild(contentSpan);
    const metaDiv=document.createElement('div'); metaDiv.className='meta'; metaDiv.textContent='🤖 AI';
    aiDiv.appendChild(metaDiv);
    chatBox.appendChild(aiDiv); chatBox.scrollTop=chatBox.scrollHeight;

    let fullText='', fullThinking='';
    try{
        const controller=new AbortController(); streamAbort=controller;
        const resp=await fetch('/api/chat',{
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({model, messages:chatHistory, api_key:apiKey||undefined, stream:true}),
            signal:controller.signal
        });
        if(!resp.ok){
            let err='Lỗi HTTP '+resp.status;
            try{const e=await resp.json(); err=e.error?.message||err;}catch(e){}
            contentSpan.innerHTML='<span style="color:#ff3355;">❌ '+escapeHtml(err)+'</span>';
            return;
        }
        const reader=resp.body.getReader(); const decoder=new TextDecoder(); let buffer='';
        while(true){
            const {done, value}=await reader.read(); if(done) break;
            buffer+=decoder.decode(value,{stream:true});
            const lines=buffer.split('\n'); buffer=lines.pop()||'';
            for(const line of lines){
                if(line.startsWith(':')) continue; // keep‑alive comment
                if(!line.startsWith('data: ')) continue;
                const payload=line.slice(6);
                if(payload==='[DONE]') continue;
                try{
                    const json=JSON.parse(payload);
                    if(json.error){contentSpan.innerHTML='<span style="color:#ff3355;">❌ '+escapeHtml(json.error)+'</span>'; return;}
                    if(json.thinking){
                        thinkingDiv.style.display='block';
                        fullThinking+=json.thinking;
                        document.getElementById('liveThinking').innerText=fullThinking;
                    }
                    if(json.token){
                        fullText+=json.token;
                        contentSpan.innerHTML=parseMarkdown(fullText);
                    }
                    chatBox.scrollTop=chatBox.scrollHeight;
                }catch(e){}
            }
        }
    }catch(e){
        if(e.name!=='AbortError') contentSpan.innerHTML='<span style="color:#ff3355;">❌ Lỗi: '+escapeHtml(e.message)+'</span>';
    }finally{
        aiDiv.removeAttribute('id');
        isStreaming=false; document.getElementById('sendBtn').disabled=false; streamAbort=null;
        if(fullText) chatHistory.push({role:'assistant', content:fullText});
    }
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
userInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
document.getElementById('clearBtn').addEventListener('click',()=>{
    if(confirm('Xoá lịch sử?')){chatBox.innerHTML=''; chatHistory=[];}
});

// ─────────────── TTS ───────────────
let ttsLoading=false;
document.getElementById('ttsGenerateBtn').addEventListener('click',async()=>{
    if(ttsLoading) return;
    const text=document.getElementById('ttsText').value.trim(); if(!text){alert('Nhập văn bản!'); return;}
    const model=document.getElementById('ttsModelSelect').value; if(!model){alert('Chọn model TTS!'); return;}
    ttsLoading=true; const btn=document.getElementById('ttsGenerateBtn'); btn.textContent='⏳...'; btn.disabled=true;
    try{
        const resp=await fetch('/api/tts',{
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({model, text, api_key:apiKey||undefined})
        });
        if(!resp.ok){const e=await resp.json().catch(()=>({})); alert('Lỗi: '+(e.error?.message||resp.status)); return;}
        const blob=await resp.blob(); const url=URL.createObjectURL(blob);
        document.getElementById('ttsAudio').src=url;
        document.getElementById('ttsAudioContainer').style.display='flex';
        document.getElementById('ttsDownload').href=url;
    }catch(e){alert('Lỗi: '+e.message);}
    finally{ttsLoading=false; btn.textContent='🎤 Tạo giọng nói'; btn.disabled=false;}
});

loadModels();
</script>
</body>
</html>
